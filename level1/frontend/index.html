<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Manager</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Product Manager</h1>
  </header>

  <main>
    <section class="form-section">
      <h2 id="form-title">Add New Product</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">

        <div class="form-group">
          <label for="name">Product Name</label>
          <input type="text" id="name" name="name" required placeholder="Enter product name">
        </div>

        <div class="form-group">
          <label for="description">Description</label>
          <textarea id="description" name="description" rows="3" placeholder="Enter product description"></textarea>
        </div>

        <div class="form-group">
          <label for="price">Price ($)</label>
          <input type="number" id="price" name="price" required min="0" step="0.01" placeholder="0.00">
        </div>

        <div class="form-group">
          <label for="category">Category</label>
          <input type="text" id="category" name="category" placeholder="Enter category">
        </div>

        <div class="form-group checkbox-group">
          <label for="inStock">
            <input type="checkbox" id="inStock" name="inStock" checked>
            In Stock
          </label>
        </div>

        <div class="form-actions">
          <button type="submit" id="submit-btn">Add Product</button>
          <button type="button" id="cancel-btn" class="btn-cancel" hidden>Cancel</button>
        </div>
      </form>
    </section>

    <section class="products-section">
      <h2>Products</h2>
      <div id="error-message" class="error-message" hidden></div>
      <div id="loading" class="loading" hidden>
        <div class="spinner"></div>
        <p>Loading products...</p>
      </div>
      <div id="products-grid" class="products-grid"></div>
      <p id="no-products" class="no-products" hidden>No products found. Add one above!</p>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
